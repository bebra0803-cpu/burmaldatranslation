<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Бурмалдат">
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D0%91%D1%83%D1%80%D0%BC%D0%B0%D0%BB%D0%B4%D0%B0%D1%82%D1%81%D0%BA%D0%B8%D0%B9%20%D0%BF%D0%B5%D1%80%D0%B5%D0%B2%D0%BE%D0%B4%D1%87%D0%B8%D0%BA%22%2C%22short_name%22%3A%22%D0%91%D1%83%D1%80%D0%BC%D0%B0%D0%BB%D0%B4%D0%B0%D1%82%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a1a2e%22%2C%22theme_color%22%3A%22%23e94560%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Crect%20width%3D'100'%20height%3D'100'%20rx%3D'20'%20fill%3D'%231a1a2e'%2F%3E%3Ctext%20x%3D'50'%20y%3D'65'%20font-size%3D'55'%20text-anchor%3D'middle'%20fill%3D'%23e94560'%20font-family%3D'Arial'%3E%D0%91%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%2C%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20512%20512'%3E%3Crect%20width%3D'512'%20height%3D'512'%20rx%3D'100'%20fill%3D'%231a1a2e'%2F%3E%3Ctext%20x%3D'256'%20y%3D'330'%20font-size%3D'280'%20text-anchor%3D'middle'%20fill%3D'%23e94560'%20font-family%3D'Arial'%20font-weight%3D'bold'%3E%D0%91%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    
    <title>Бурмалдатский Переводчик</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }

        textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(233, 69, 96, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            50% { transform: translateY(-100vh) translateX(100px) rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(233, 69, 96, 0.1),
                        inset 0 0 60px rgba(233, 69, 96, 0.05);
        }

        @media (hover: hover) {
            .container:hover {
                transform: translateY(-5px);
                box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5),
                            0 0 0 1px rgba(233, 69, 96, 0.2),
                            inset 0 0 80px rgba(233, 69, 96, 0.08);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .title {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .translator-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
        }

        .label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .label-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e94560;
            box-shadow: 0 0 10px #e94560;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #e94560; }
            50% { box-shadow: 0 0 25px #e94560, 0 0 50px #e94560; }
        }

        .output-label .label-icon {
            background: #ffd93d;
            box-shadow: 0 0 10px #ffd93d;
            animation: pulse-yellow 2s infinite;
        }

        @keyframes pulse-yellow {
            0%, 100% { box-shadow: 0 0 10px #ffd93d; }
            50% { box-shadow: 0 0 25px #ffd93d, 0 0 50px #ffd93d; }
        }

        textarea {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            resize: vertical;
            min-height: 130px;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            border-color: #e94560;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #outputText {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 215, 0, 0.2);
        }

        #outputText:focus {
            border-color: #ffd93d;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-reverse {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
            flex: 2;
            min-width: 160px;
        }

        @media (hover: hover) {
            .btn-reverse:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 40px rgba(108, 92, 231, 0.6);
            }
        }

        .btn-reverse:active {
            transform: scale(0.95);
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex: 1;
        }

        @media (hover: hover) {
            .btn-copy:hover {
                background: rgba(255, 255, 255, 0.2);
                border-color: #ffd93d;
                box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
                transform: translateY(-3px);
            }
        }

        .btn-clear {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            flex: 0.7;
        }

        @media (hover: hover) {
            .btn-clear:hover {
                color: white;
                border-color: rgba(255, 255, 255, 0.4);
                background: rgba(255, 255, 255, 0.05);
                transform: translateY(-3px);
            }
        }

        .direction-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .direction-arrow {
            color: #ffd93d;
            font-size: 18px;
            transition: transform 0.4s ease;
        }

        .direction-arrow.reversed {
            transform: rotate(180deg);
        }

        .direction-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .copy-notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-150px);
            background: #ffd93d;
            color: #1a1a2e;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #ffd93d;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
                padding-top: max(20px, env(safe-area-inset-top));
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px;
                border-radius: 25px;
            }
            .title {
                font-size: 36px;
            }
            .btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
                align-items: flex-start;
                padding-top: 30px;
            }
            .container {
                padding: 20px;
                border-radius: 20px;
            }
            .header {
                margin-bottom: 25px;
            }
            .title {
                font-size: 28px;
                letter-spacing: 1px;
            }
            .translator-box {
                gap: 15px;
            }
            .label {
                font-size: 12px;
                letter-spacing: 0.5px;
            }
            textarea {
                font-size: 16px;
                padding: 15px;
                min-height: 110px;
                border-radius: 15px;
            }
            .button-group {
                gap: 8px;
            }
            .btn {
                padding: 12px 15px;
                font-size: 12px;
                letter-spacing: 0.5px;
                border-radius: 40px;
            }
            .btn-reverse {
                min-width: 100%;
                flex: 1 1 100%;
            }
            .btn-copy {
                flex: 1;
            }
            .btn-clear {
                flex: 0.5;
            }
            .stats {
                gap: 20px;
                margin-top: 15px;
            }
            .stat-value {
                font-size: 20px;
            }
            .stat-label {
                font-size: 10px;
            }
            .copy-notification {
                top: 20px;
                padding: 12px 25px;
                font-size: 14px;
            }
        }

        @media (max-width: 380px) {
            body {
                padding: 5px;
                padding-top: 20px;
            }
            .container {
                padding: 15px;
                border-radius: 15px;
            }
            .title {
                font-size: 24px;
            }
            .header {
                margin-bottom: 20px;
            }
            textarea {
                font-size: 16px;
                padding: 12px;
                min-height: 90px;
                border-radius: 12px;
            }
            .btn {
                padding: 10px 12px;
                font-size: 11px;
                letter-spacing: 0;
            }
            .label {
                font-size: 11px;
            }
            .stat-value {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="copy-notification" id="notification">✅ Скопировано!</div>

    <div class="container">
        <div class="header">
            <h1 class="title">БУРМАЛДАТСКИЙ</h1>
            <div class="direction-indicator">
                <span class="direction-text" id="directionLabel">Русский → Бурмалдатский</span>
                <span class="direction-arrow" id="directionArrow">↓</span>
            </div>
        </div>

        <div class="translator-box">
            <div class="input-group">
                <div class="label">
                    <span class="label-icon"></span>
                    <span id="inputLabel">Текст на русском</span>
                </div>
                <textarea 
                    id="inputText" 
                    placeholder="Пиши сюда, бро..."
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                ></textarea>
            </div>

            <div class="button-group">
                <button class="btn btn-reverse" id="reverseBtn">
                    🔄 Поменять
                </button>
                <button class="btn btn-copy" id="copyBtn">
                    📋 Копировать
                </button>
                <button class="btn btn-clear" id="clearBtn">
                    ✕ Очистить
                </button>
            </div>

            <div class="input-group">
                <div class="label output-label">
                    <span class="label-icon"></span>
                    <span id="outputLabel">Бурмалдатский</span>
                </div>
                <textarea 
                    id="outputText" 
                    placeholder="Тут будет перевод..." 
                    readonly
                ></textarea>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="charCount">0</div>
                    <div class="stat-label">символов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">слов</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== СЛОВАРЬ БУРМАЛДАТСКОГО (ИСКЛЮЧЕНИЯ) ====================
        const REPLACEMENTS = {
            // Местоимения и короткие слова
            "я": "ч", "мне": "мье", "мы": "мч", "кто": "кьо",
            "это": "эьо", "то": "ьо", "да": "дэ",
            "лет": "тет", "сек": "чек", "пшо": "его",
            
            // Существительные
            "друг": "друн", "кот": "котость", "школа": "школость",
            "телефон": "бурмалдфон", "заяц": "бурмалдаяц",
            "птички": "бурмалдички", "зонтом": "зонтичностью",
            "внук": "внуч", "дед": "дод",
            "меллстрой": "меллстройность",
            "фамилия": "фомилия", "максим": "еле говрящий Максим",
            "эверест": "элевер", "чёрт": "тёлт", "черт": "тёлт",
            "блин": "бл*н", "тенге": "ценге", "манго": "mango",
            "парни": "барни", "хогвартс": "fogвартс",
            "роналдо": "рональжо", "жопа": "туз", "лайк": "лося",
            "пена": "пема", "берёза": "береза", "береза": "береза",
            "дуб": "дур", "мод": "мож",
            "куколд": "Qcold", "обновление": "боновление",
            "хомяк": "хамям",
            "слов": "слоч",
            "суп": "рамен",
            "батя": "батч",
            "мама": "мом",
            
            // Глаголы
            "гулять": "БЛЯДЬ гулять", "смеяться": "сметанаяйца",
            "старался": "стараласт", "старалась": "стараласт",
            "кинула": "кикула", "было": "блыо",
            "нажимают": "поживают",
            "закончиться": "закосица",
            "писать": "пирать",
            "писал": "пирал",
            "пишут": "пирут",
            "соглашусь": "соглашунь",
            "пишу": "пизу",
            "попутал": "порупал",
            
            // Прилагательные/наречия
            "важнее": "вишнее", "нишевая": "нищая",
            "отлично": "бурмалда", "поганец": "понанец",
            "правильно": "прыгилдо",
            "естественно": "ест вест венно",
            "ладно": "ларго",
            "кажется": "калеттся",
            "лучше": "луме",
        };

        const REVERSE_REPLACEMENTS = {};
        for (const [ru, bur] of Object.entries(REPLACEMENTS)) {
            REVERSE_REPLACEMENTS[bur.toLowerCase()] = ru;
        }

        const GREETINGS = new Set([
            "привет", "пока", "здравствуй", "здравствуйте", "здарова",
            "добрый", "доброе", "доброй", "доброго",
            "спокойной", "спокойного",
            "хелло", "hello", "hi", "hey", "йоу", "йо",
            "бай", "bye", "гудбай", "goodbye",
            "до", "свидания", "свиданья",
            "салют", "салам", "ку", "хай", "шалом",
            "вечер", "ночи", "утро", "день",
            "приветствую", "приветик", "прив",
            "здрасте", "здрасьте", "дарова",
        ]);

        const QUESTION_WORDS = new Set([
            "как", "какой", "какая", "какое", "какие",
            "каков", "какова", "каково", "каковы",
            "чей", "чья", "чьё", "чьи",
            "кем", "ком", "кому", "кого",
            "где", "куда", "откуда",
            "когда", "зачем", "почему", "отчего",
            "сколько", "насколько",
            "который", "которая", "которое", "которые",
        ]);

        const NO_SUFFIX_WORDS = new Set([
            "я", "ты", "он", "она", "оно", "мы", "вы", "они",
            "меня", "тебя", "его", "её", "нас", "вас", "их",
            "мне", "тебе", "ему", "ей", "нам", "вам", "им",
            "мной", "тобой", "им", "ею", "нами", "вами", "ими",
            "обо", "него", "неё", "них",
            "мой", "твой", "свой", "наш", "ваш",
            "моя", "твоя", "своя", "наша", "ваша",
            "моё", "твоё", "своё", "наше", "ваше",
            "мои", "твои", "свои", "наши", "ваши",
            "этот", "эта", "эти", "этом", "этой", "этих",
            "тот", "та", "то", "те", "том", "той", "тех",
            "такой", "такая", "такое", "такие",
            "столько", "тут", "там", "здесь", "вот", "вон",
            "в", "на", "с", "по", "из", "от", "за", "до",
            "об", "под", "над", "при", "про", "без", "для",
            "к", "у", "о", "со", "во", "ко", "изо", "ото",
            "перед", "через", "между", "ради", "вокруг",
            "около", "после", "прежде", "против", "среди",
            "и", "а", "но", "или", "либо", "ли", "бы", "же",
            "что", "чтобы", "если", "когда", "пока",
            "ведь", "хоть", "хотя", "раз", "словно", "будто",
            "точно", "как", "так", "тоже", "также", "зато",
            "однако", "притом", "причём", "итак", "потому",
            "не", "ни", "да", "нет", "бы", "ли", "же", "уж",
            "уже", "ещё", "всё", "все", "сам", "сама", "само", "сами",
            "себе", "себя", "собой",
            "был", "была", "было", "были",
            "есть", "буду", "будет", "будут",
            "бро", "типо", "типа", "ну", "короче",
            "вообще", "ваще", "реально", "жесть",
        ]);

        const SWEAR_WORDS = new Set([
            "хуй", "нахуй", "нахуя", "дохуя", "похуй", "похую",
            "хуёвый", "хуёво", "хуйня", "хуйню", "хуйней",
            "пизда", "пиздец", "пиздюк", "пиздеть", "пиздишь",
            "ебать", "ебал", "ебала", "ебали", "ебёт", "ебу",
            "ебанутый", "ебанный", "еблан", "ебло",
            "блядь", "блять", "бля", "блядина", "блядство",
            "сука", "суки", "сука", "суку",
            "ахуеть", "ахуел", "ахуела", "охуеть", "охуел",
            "заебал", "заебала", "заебало", "заебали",
            "уебок", "уебан", "уёбище",
            "гандон", "мудак", "мудила", "пидор", "пидорас",
            "хуесос", "хуеплёт", "долбоёб",
            "мразь", "тварь", "падла", "сволочь",
            "выебон", "выебываться", "проебал", "проебать",
            "наебать", "наебал", "разъебал", "разъебать",
            "въебать", "въебал", "отъебать", "отъебал",
            "подъебать", "подъебал", "съебать", "съебал",
            "ебанько", "ебануться", "ебанулся",
            "пизданутый", "пиздануть", "пизданул",
            "хуярить", "хуярит", "хуярил",
            "хули", "нах", "пох", "схуя", "схуяли",
        ]);

        const VERB_ENDINGS = [
            "ть", "ти", "чь", "тся", "ться",
            "ю", "ешь", "ет", "ем", "ете", "ют", "ут",
            "ишь", "ит", "им", "ите", "ат", "ят",
            "л", "ла", "ло", "ли",
            "й", "йте", "ь", "ься", "ся",
            "уй", "уйте", "ай", "айте", "ей", "ейте",
            "овал", "евала", "овало", "овали",
            "ывал", "ывала", "ывало", "ывали",
            "ивал", "ивала", "ивало", "ивали",
        ];

        const PARTICIPLE_ENDINGS = [
            "вший", "вшая", "вшее", "вшие",
            "щий", "щая", "щее", "щие",
            "нный", "нная", "нное", "нные",
            "тый", "тая", "тое", "тые",
            "ая", "яя", "ущий", "ющий",
            "ав", "авши", "ев", "евши",
            "я", "а", "учи", "ючи",
        ];

        let isReversed = false;

        function isGreeting(word) { return GREETINGS.has(word.toLowerCase()); }
        function isQuestionWord(word) { return QUESTION_WORDS.has(word.toLowerCase()); }
        function isNoSuffixWord(word) { return NO_SUFFIX_WORDS.has(word.toLowerCase()); }
        function isSwearWord(word) { return SWEAR_WORDS.has(word.toLowerCase()); }

        function isPlural(word) {
            const lower = word.toLowerCase();
            
            const pluralEndings = [
                "ы", "и", "а", "я",
                "ов", "ев", "ей", "ий", "ых", "их",
                "ам", "ям",
                "ами", "ями", "ими", "ыми",
                "ах", "ях",
            ];
            
            const gerundEndings = ["авши", "евши", "учи", "ючи", "вши", "вша"];
            for (const ending of gerundEndings) {
                if (lower.endsWith(ending)) return false;
            }
            
            for (const ending of pluralEndings) {
                if (lower.endsWith(ending) && lower.length > ending.length + 2) {
                    return true;
                }
            }
            
            return false;
        }

        function isVerb(word) {
            const lower = word.toLowerCase();
            for (const ending of VERB_ENDINGS) {
                if (lower.endsWith(ending) && lower.length > ending.length + 1) return true;
            }
            if (lower.endsWith("ть") || lower.endsWith("ти") || lower.endsWith("чь")) return true;
            if (lower.match(/[а-яё]+л[аои]?$/i) && lower.length > 3) return true;
            if (lower.match(/[а-яё]+[юуеиая][тшщ]?$/i) && lower.length > 3) return true;
            return false;
        }

        function isParticipleOrGerund(word) {
            const lower = word.toLowerCase();
            for (const ending of PARTICIPLE_ENDINGS) {
                if (lower.endsWith(ending) && lower.length > ending.length + 1) return true;
            }
            return false;
        }

        // Русский → Бурмалдатский
        function translateWord(word) {
            const isCapitalized = /^[А-ЯЁA-Z]/.test(word);
            const wordLower = word.toLowerCase();

            // 1. Словарь исключений
            if (wordLower in REPLACEMENTS) {
                let result = REPLACEMENTS[wordLower];
                if (isCapitalized) result = result.charAt(0).toUpperCase() + result.slice(1);
                return result;
            }

            // 2. Приветствия
            if (isGreeting(wordLower)) return word;

            // 3. Вопросительные
            if (isQuestionWord(wordLower)) return word;

            // 4. Служебные/местоимения
            if (isNoSuffixWord(wordLower)) return word;

            // 5. Маты
            if (isSwearWord(wordLower)) return word;

            // 6. Множественное число → "ности"
            if (isPlural(wordLower)) {
                let stripped = wordLower.replace(/(ов|ев|ей|ий|ых|их|ам|ям|ами|ями|ими|ыми|ах|ях|ы|и|а|я)$/, '');
                if (stripped.length < 2) stripped = wordLower;
                const finalWord = stripped + "ности";
                return isCapitalized ? finalWord.charAt(0).toUpperCase() + finalWord.slice(1) : finalWord;
            }

            // 7. Глаголы
            if (isVerb(wordLower)) return word;

            // 8. Причастия/деепричастия
            if (isParticipleOrGerund(wordLower)) return word;

            // 9. Обычные слова → "ность"
            const wordStripped = wordLower.replace(/[аеёиоуыэюяьъ]$/, '');
            const finalWord = (wordStripped.length >= 2 ? wordStripped : wordLower) + "ность";
            return isCapitalized ? finalWord.charAt(0).toUpperCase() + finalWord.slice(1) : finalWord;
        }

        // Бурмалдатский → Русский
        function reverseTranslateWord(word) {
            const isCapitalized = /^[А-ЯЁA-Z]/.test(word);
            const wordLower = word.toLowerCase();

            if (wordLower in REVERSE_REPLACEMENTS) {
                let result = REVERSE_REPLACEMENTS[wordLower];
                if (isCapitalized) result = result.charAt(0).toUpperCase() + result.slice(1);
                return result;
            }

            if (wordLower.endsWith("ности") && wordLower.length > 6) {
                let stripped = wordLower.slice(0, -4);
                if (isCapitalized) stripped = stripped.charAt(0).toUpperCase() + stripped.slice(1);
                return stripped + "ы";
            }

            if (wordLower.endsWith("ность") && wordLower.length > 6) {
                let stripped = wordLower.slice(0, -5);
                if (isCapitalized) stripped = stripped.charAt(0).toUpperCase() + stripped.slice(1);
                return stripped;
            }

            if (wordLower.endsWith("ость") && wordLower.length > 5) {
                let stripped = wordLower.slice(0, -4);
                if (isCapitalized) stripped = stripped.charAt(0).toUpperCase() + stripped.slice(1);
                return stripped;
            }

            return word;
        }

        function translateToBurmaldat(text) {
            const tokens = text.match(/[а-яА-ЯёЁa-zA-Z]+|[^а-яА-ЯёЁa-zA-Z]+/g) || [];
            return tokens.map(token => {
                if (/[а-яА-ЯёЁa-zA-Z]/.test(token)) {
                    return isReversed ? reverseTranslateWord(token) : translateWord(token);
                }
                return token;
            }).join('');
        }

        // ==================== UI ====================
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const notification = document.getElementById('notification');
        const directionLabel = document.getElementById('directionLabel');
        const directionArrow = document.getElementById('directionArrow');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');

        function updateDirectionUI() {
            if (isReversed) {
                directionLabel.textContent = 'Бурмалдатский → Русский';
                directionArrow.classList.add('reversed');
                inputLabel.textContent = 'Текст на бурмалдатском';
                outputLabel.textContent = 'Русский перевод';
                inputText.placeholder = 'Пиши по-бурмалдатски, бро...';
                outputText.placeholder = 'Тут будет русский...';
            } else {
                directionLabel.textContent = 'Русский → Бурмалдатский';
                directionArrow.classList.remove('reversed');
                inputLabel.textContent = 'Текст на русском';
                outputLabel.textContent = 'Бурмалдатский';
                inputText.placeholder = 'Пиши сюда, бро...';
                outputText.placeholder = 'Тут будет перевод...';
            }
        }

        function translateText() {
            const input = inputText.value;
            outputText.value = translateToBurmaldat(input);
            const chars = input.replace(/\s/g, '').length;
            const words = input.trim() ? input.trim().split(/\s+/).length : 0;
            charCount.textContent = chars;
            wordCount.textContent = words;

            try { localStorage.setItem('burmaldat_input', input); } catch(e) {}
            try { localStorage.setItem('burmaldat_reversed', isReversed); } catch(e) {}
        }

        function toggleReverse() {
            isReversed = !isReversed;
            updateDirectionUI();
            
            const temp = inputText.value;
            inputText.value = outputText.value;
            outputText.value = temp;
            
            const input = inputText.value;
            const chars = input.replace(/\s/g, '').length;
            const words = input.trim() ? input.trim().split(/\s+/).length : 0;
            charCount.textContent = chars;
            wordCount.textContent = words;
            
            try { localStorage.setItem('burmaldat_input', inputText.value); } catch(e) {}
            try { localStorage.setItem('burmaldat_reversed', isReversed); } catch(e) {}
        }

        function copyText() {
            if (!outputText.value) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(outputText.value).then(showNotification);
            } else {
                outputText.select();
                document.execCommand('copy');
                showNotification();
            }
        }

        function clearAll() {
            inputText.value = '';
            outputText.value = '';
            charCount.textContent = '0';
            wordCount.textContent = '0';
            try { localStorage.removeItem('burmaldat_input'); } catch(e) {}
            inputText.focus();
        }

        function showNotification() {
            notification.classList.add('show');
            clearTimeout(notification._timeout);
            notification._timeout = setTimeout(() => notification.classList.remove('show'), 2000);
            if (navigator.vibrate) navigator.vibrate(50);
        }

        document.getElementById('reverseBtn').addEventListener('click', toggleReverse);
        document.getElementById('copyBtn').addEventListener('click', copyText);
        document.getElementById('clearBtn').addEventListener('click', clearAll);

        let debounceTimer;
        inputText.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(translateText, 150);
        });

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('pointerdown', function(e) {
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        try {
            const savedReversed = localStorage.getItem('burmaldat_reversed');
            if (savedReversed === 'true') {
                isReversed = true;
                updateDirectionUI();
            }
            const saved = localStorage.getItem('burmaldat_input');
            if (saved) { inputText.value = saved; translateText(); }
        } catch(e) {}

        function createParticles() {
            const container = document.getElementById('particles');
            const count = window.innerWidth < 600 ? 15 : 30;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'burmaldat-v13';
                const ASSETS = [self.location.href];
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(cached => cached || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }
    </script>
</body>
</html>
