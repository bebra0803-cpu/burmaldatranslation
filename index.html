<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Бурмалдат">
    
    <!-- Манифест вставляем прямо через JavaScript (чтобы PWABuilder увидел) -->
    <script>
        // Создаём манифест динамически
        const manifest = {
            name: "Бурмалдатский переводчик",
            short_name: "Бурмалдат",
            start_url: "/",
            display: "standalone",
            background_color: "#1a1a2e",
            theme_color: "#e94560",
            icons: [
                {
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a2e'/%3E%3Ctext x='50' y='65' font-size='55' text-anchor='middle' fill='%23e94560' font-family='Arial'%3E%D0%91%3C/text%3E%3C/svg%3E",
                    sizes: "192x192",
                    type: "image/svg+xml",
                    purpose: "any maskable"
                },
                {
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%231a1a2e'/%3E%3Ctext x='256' y='330' font-size='280' text-anchor='middle' fill='%23e94560' font-family='Arial' font-weight='bold'%3E%D0%91%3C/text%3E%3C/svg%3E",
                    sizes: "512x512",
                    type: "image/svg+xml",
                    purpose: "any maskable"
                }
            ]
        };
        
        // Вставляем манифест в head
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(manifest));
        document.head.appendChild(link);
        
        // Регистрируем Service Worker (автоматически создаётся из кода)
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'burmaldat-v6';
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['/'])));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(caches.keys().then(keys => Promise.all(
                        keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))
                    )));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl)
                .then(() => console.log('✅ SW зарегистрирован'))
                .catch(err => console.log('❌ SW ошибка:', err));
        }
    </script>
    
    <title>Бурмалдатский Переводчик</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }

        textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(233, 69, 96, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            50% { transform: translateY(-100vh) translateX(100px) rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(233, 69, 96, 0.1),
                        inset 0 0 60px rgba(233, 69, 96, 0.05);
        }

        @media (hover: hover) {
            .container:hover {
                transform: translateY(-5px);
                box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5),
                            0 0 0 1px rgba(233, 69, 96, 0.2),
                            inset 0 0 80px rgba(233, 69, 96, 0.08);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .title {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .translator-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
        }

        .label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .label-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e94560;
            box-shadow: 0 0 10px #e94560;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #e94560; }
            50% { box-shadow: 0 0 25px #e94560, 0 0 50px #e94560; }
        }

        .output-label .label-icon {
            background: #ffd93d;
            box-shadow: 0 0 10px #ffd93d;
            animation: pulse-yellow 2s infinite;
        }

        @keyframes pulse-yellow {
            0%, 100% { box-shadow: 0 0 10px #ffd93d; }
            50% { box-shadow: 0 0 25px #ffd93d, 0 0 50px #ffd93d; }
        }

        textarea {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            resize: vertical;
            min-height: 130px;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            border-color: #e94560;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #outputText {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 215, 0, 0.2);
        }

        #outputText:focus {
            border-color: #ffd93d;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-reverse {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
            flex: 2;
            min-width: 160px;
        }

        @media (hover: hover) {
            .btn-reverse:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 40px rgba(108, 92, 231, 0.6);
            }
        }

        .btn-reverse:active {
            transform: scale(0.95);
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex: 1;
        }

        @media (hover: hover) {
            .btn-copy:hover {
                background: rgba(255, 255, 255, 0.2);
                border-color: #ffd93d;
                box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
                transform: translateY(-3px);
            }
        }

        .btn-clear {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            flex: 0.7;
        }

        @media (hover: hover) {
            .btn-clear:hover {
                color: white;
                border-color: rgba(255, 255, 255, 0.4);
                background: rgba(255, 255, 255, 0.05);
                transform: translateY(-3px);
            }
        }

        .direction-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .direction-arrow {
            color: #ffd93d;
            font-size: 18px;
            transition: transform 0.4s ease;
        }

        .direction-arrow.reversed {
            transform: rotate(180deg);
        }

        .direction-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .copy-notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-150px);
            background: #ffd93d;
            color: #1a1a2e;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #ffd93d;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
                padding-top: max(20px, env(safe-area-inset-top));
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px;
                border-radius: 25px;
            }
            .title {
                font-size: 36px;
            }
            .btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
                align-items: flex-start;
                padding-top: 30px;
            }
            .container {
                padding: 20px;
                border-radius: 20px;
            }
            .header {
                margin-bottom: 25px;
            }
            .title {
                font-size: 28px;
                letter-spacing: 1px;
            }
            .translator-box {
                gap: 15px;
            }
            .label {
                font-size: 12px;
                letter-spacing: 0.5px;
            }
            textarea {
                font-size: 16px;
                padding: 15px;
                min-height: 110px;
                border-radius: 15px;
            }
            .button-group {
                gap: 8px;
            }
            .btn {
                padding: 12px 15px;
                font-size: 12px;
                letter-spacing: 0.5px;
                border-radius: 40px;
            }
            .btn-reverse {
                min-width: 100%;
                flex: 1 1 100%;
            }
            .btn-copy {
                flex: 1;
            }
            .btn-clear {
                flex: 0.5;
            }
            .stats {
                gap: 20px;
                margin-top: 15px;
            }
            .stat-value {
                font-size: 20px;
            }
            .stat-label {
                font-size: 10px;
            }
            .copy-notification {
                top: 20px;
                padding: 12px 25px;
                font-size: 14px;
            }
        }

        @media (max-width: 380px) {
            body {
                padding: 5px;
                padding-top: 20px;
            }
            .container {
                padding: 15px;
                border-radius: 15px;
            }
            .title {
                font-size: 24px;
            }
            .header {
                margin-bottom: 20px;
            }
            textarea {
                font-size: 16px;
                padding: 12px;
                min-height: 90px;
                border-radius: 12px;
            }
            .btn {
                padding: 10px 12px;
                font-size: 11px;
                letter-spacing: 0;
            }
            .label {
                font-size: 11px;
            }
            .stat-value {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="copy-notification" id="notification">✅ Скопировано!</div>

    <div class="container">
        <div class="header">
            <h1 class="title">БУРМАЛДАТСКИЙ</h1>
            <div class="direction-indicator">
                <span class="direction-text" id="directionLabel">Русский → Бурмалдатский</span>
                <span class="direction-arrow" id="directionArrow">↓</span>
            </div>
        </div>

        <div class="translator-box">
            <div class="input-group">
                <div class="label">
                    <span class="label-icon"></span>
                    <span id="inputLabel">Текст на русском</span>
                </div>
                <textarea 
                    id="inputText" 
                    placeholder="Пиши сюда, бро..."
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                ></textarea>
            </div>

            <div class="button-group">
                <button class="btn btn-reverse" id="reverseBtn">
                    🔄 Поменять
                </button>
                <button class="btn btn-copy" id="copyBtn">
                    📋 Копировать
                </button>
                <button class="btn btn-clear" id="clearBtn">
                    ✕ Очистить
                </button>
            </div>

            <div class="input-group">
                <div class="label output-label">
                    <span class="label-icon"></span>
                    <span id="outputLabel">Бурмалдатский</span>
                </div>
                <textarea 
                    id="outputText" 
                    placeholder="Тут будет перевод..." 
                    readonly
                ></textarea>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="charCount">0</div>
                    <div class="stat-label">символов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">слов</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== СЛОВАРЬ ====================
        const REPLACEMENTS = {
            "я": "ч", "мне": "мье", "мы": "мч", "кто": "кьо",
            "это": "эьо", "что": "ято", "то": "ьо", "да": "дэ",
            "лет": "тет", "сек": "чек", "пшо": "его",
            "друг": "друн", "кот": "котость", "школа": "школость",
            "телефон": "бурмалдфон", "заяц": "бурмалдаяц",
            "птички": "бурмалдички", "зонтом": "зонтичностью",
            "внук": "внуч", "меллстрой": "меллстройность",
            "фамилия": "фомилия", "максим": "еле говрящий Максим",
            "эверест": "элевер", "чёрт": "тёлт", "черт": "тёлт",
            "блин": "бл*н", "тенге": "ценге", "манго": "maaaaaango",
            "парни": "барни", "хогвартс": "fogвартс",
            "роналдо": "рональжо", "жопа": "туз", "лайк": "лося",
            "пена": "пема", "берёза": "береза", "береза": "береза",
            "дуб": "дур", "мод": "мож",
            "гулять": "БЛЯДЬ гулять", "смеяться": "сметанаяйца",
            "старался": "стараласт", "старалась": "стараласт",
            "кинула": "кикула", "важнее": "вишнее",
            "нишевая": "нищая", "отлично": "бурмалда",
            "поганец": "понанец",
        };

        const REVERSE_REPLACEMENTS = {};
        for (const [ru, bur] of Object.entries(REPLACEMENTS)) {
            REVERSE_REPLACEMENTS[bur.toLowerCase()] = ru;
        }

        const GREETINGS = new Set([
            "привет", "пока", "здравствуй", "здравствуйте", "здарова",
            "добрый", "доброе", "доброй", "доброго",
            "спокойной", "спокойного",
            "хелло", "hello", "hi", "hey", "йоу", "йо",
            "бай", "bye", "гудбай", "goodbye",
            "до", "свидания", "свиданья",
            "салют", "салам", "ку", "хай", "шалом",
            "вечер", "ночи", "утро", "день",
            "приветствую", "приветик", "прив",
            "здрасте", "здрасьте", "дарова",
        ]);

        const QUESTION_WORDS = new Set([
            "как", "какой", "какая", "какое", "какие",
            "каков", "какова", "каково", "каковы",
            "чей", "чья", "чьё", "чьи",
            "кем", "ком", "кому", "кого", "который",
            "которая", "которое", "которые",
            "где", "куда", "откуда",
            "когда", "зачем", "почему", "отчего",
            "сколько", "насколько",
        ]);

        const PARTICIPLE_ENDINGS = [
            "вший", "вшая", "вшее", "вшие",
            "щий", "щая", "щее", "щие",
            "нный", "нная", "нное", "нные",
            "тый", "тая", "тое", "тые",
            "ая", "яя", "ущий", "ющий",
            "ав", "авши", "ев", "евши",
            "я", "а", "учи", "ючи",
        ];

        let isReversed = false;

        function isGreeting(word) { return GREETINGS.has(word.toLowerCase()); }
        function isQuestionWord(word) { return QUESTION_WORDS.has(word.toLowerCase()); }

        function isParticipleOrGerund(word) {
            const lower = word.toLowerCase();
            for (const ending of PARTICIPLE_ENDINGS) {
                if (lower.endsWith(ending) && lower.length > ending.length + 1) return true;
            }
            return false;
        }

        function translateWord(word) {
            const isCapitalized = /^[А-ЯЁA-Z]/.test(word);
            const wordLower = word.toLowerCase();

            if (wordLower in REPLACEMENTS) {
                let result = REPLACEMENTS[wordLower];
                if (isCapitalized) result = result.charAt(0).toUpperCase() + result.slice(1);
                return result;
            }
            if (isGreeting(wordLower)) return word;
            if (isQuestionWord(wordLower)) return word;
            if (isParticipleOrGerund(wordLower)) return word;

            const wordStripped = wordLower.replace(/[аеёиоуыэюяьъ]$/, '');
            const finalWord = (wordStripped.length >= 2 ? wordStripped : wordLower) + "ность";
            return isCapitalized ? finalWord.charAt(0).toUpperCase() + finalWord.slice(1) : finalWord;
        }

        function reverseTranslateWord(word) {
            const isCapitalized = /^[А-ЯЁA-Z]/.test(word);
            const wordLower = word.toLowerCase();

            if (wordLower in REVERSE_REPLACEMENTS) {
                let result = REVERSE_REPLACEMENTS[wordLower];
                if (isCapitalized) result = result.charAt(0).toUpperCase() + result.slice(1);
                return result;
            }

            if (wordLower.endsWith("ность") && wordLower.length > 6) {
                let stripped = wordLower.slice(0, -5);
                if (isCapitalized) stripped = stripped.charAt(0).toUpperCase() + stripped.slice(1);
                return stripped;
            }

            if (wordLower.endsWith("ость") && wordLower.length > 5) {
                let stripped = wordLower.slice(0, -4);
                if (isCapitalized) stripped = stripped.charAt(0).toUpperCase() + stripped.slice(1);
                return stripped;
            }

            return word;
        }

        function translateToBurmaldat(text) {
            const tokens = text.match(/[а-яА-ЯёЁa-zA-Z]+|[^а-яА-ЯёЁa-zA-Z]+/g) || [];
            return tokens.map(token => {
                if (/[а-яА-ЯёЁa-zA-Z]/.test(token)) {
                    return isReversed ? reverseTranslateWord(token) : translateWord(token);
                }
                return token;
            }).join('');
        }

        // ==================== UI ====================
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const notification = document.getElementById('notification');
        const directionLabel = document.getElementById('directionLabel');
        const directionArrow = document.getElementById('directionArrow');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');

        function updateDirectionUI() {
            if (isReversed) {
                directionLabel.textContent = 'Бурмалдатский → Русский';
                directionArrow.classList.add('reversed');
                inputLabel.textContent = 'Текст на бурмалдатском';
                outputLabel.textContent = 'Русский перевод';
                inputText.placeholder = 'Пиши по-бурмалдатски, бро...';
                outputText.placeholder = 'Тут будет русский...';
            } else {
                directionLabel.textContent = 'Русский → Бурмалдатский';
                directionArrow.classList.remove('reversed');
                inputLabel.textContent = 'Текст на русском';
                outputLabel.textContent = 'Бурмалдатский';
                inputText.placeholder = 'Пиши сюда, бро...';
                outputText.placeholder = 'Тут будет перевод...';
            }
        }

        function translateText() {
            const input = inputText.value;
            outputText.value = translateToBurmaldat(input);
            const chars = input.replace(/\s/g, '').length;
            const words = input.trim() ? input.trim().split(/\s+/).length : 0;
            charCount.textContent = chars;
            wordCount.textContent = words;

            try { localStorage.setItem('burmaldat_input', input); } catch(e) {}
            try { localStorage.setItem('burmaldat_reversed', isReversed); } catch(e) {}
        }

        function toggleReverse() {
            isReversed = !isReversed;
            updateDirectionUI();
            
            const temp = inputText.value;
            inputText.value = outputText.value;
            outputText.value = temp;
            
            const input = inputText.value;
            const chars = input.replace(/\s/g, '').length;
            const words = input.trim() ? input.trim().split(/\s+/).length : 0;
            charCount.textContent = chars;
            wordCount.textContent = words;
            
            try { localStorage.setItem('burmaldat_input', inputText.value); } catch(e) {}
            try { localStorage.setItem('burmaldat_reversed', isReversed); } catch(e) {}
        }

        function copyText() {
            if (!outputText.value) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(outputText.value).then(showNotification);
            } else {
                outputText.select();
                document.execCommand('copy');
                showNotification();
            }
        }

        function clearAll() {
            inputText.value = '';
            outputText.value = '';
            charCount.textContent = '0';
            wordCount.textContent = '0';
            try { localStorage.removeItem('burmaldat_input'); } catch(e) {}
            inputText.focus();
        }

        function showNotification() {
            notification.classList.add('show');
            clearTimeout(notification._timeout);
            notification._timeout = setTimeout(() => notification.classList.remove('show'), 2000);
            if (navigator.vibrate) navigator.vibrate(50);
        }

        document.getElementById('reverseBtn').addEventListener('click', toggleReverse);
        document.getElementById('copyBtn').addEventListener('click', copyText);
        document.getElementById('clearBtn').addEventListener('click', clearAll);

        let debounceTimer;
        inputText.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(translateText, 150);
        });

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('pointerdown', function(e) {
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        try {
            const savedReversed = localStorage.getItem('burmaldat_reversed');
            if (savedReversed === 'true') {
                isReversed = true;
                updateDirectionUI();
            }
            const saved = localStorage.getItem('burmaldat_input');
            if (saved) { inputText.value = saved; translateText(); }
        } catch(e) {}

        function createParticles() {
            const container = document.getElementById('particles');
            const count = window.innerWidth < 600 ? 15 : 30;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
    </script>
</body>
</html>
